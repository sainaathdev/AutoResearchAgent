services:
  - type: web
    name: autoReAgent
    env: docker
    plan: free # Note: free tier might struggle with memory limits if running local models.
    region: oregon # Or your preferred Render region
    dockerCommand: "streamlit run app.py --server.port 8501 --server.address 0.0.0.0" 
    envVars:
      - key: OLLAMA_BASE_URL
        value: "http://your.remote.ollama.instance:11434" # Need to change this unless hosted locally via Docker
      - key: OLLAMA_MODEL
        value: "llama3.2"
      - key: SEMANTIC_SCHOLAR_API_KEY
        sync: false # Set securely in the Render dashboard
      - key: CHROMA_DB_PATH
        value: "/opt/render/project/src/data/chroma_db"
      - key: OUTPUT_DIR
        value: "/opt/render/project/src/data/reports"
      - key: PDF_CACHE_DIR
        value: "/opt/render/project/src/data/pdf_cache"
